name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match Vite 8 engine (^20.19 || >=22.12) and npm 10 lockfile format
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build
